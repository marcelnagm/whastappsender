version: '3.8'

services:
  # MONITORAMENTO E GESTÃO (Portainer)
  # Acesso: http://157.173.100.233:9002
  portainer:
    image: portainer/portainer-ce:latest
    container_name: whatsapp_portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    ports:
      - "9443:9443"
      - "9002:9000" # Porta 9002 para evitar conflito com MinIO
    networks:
      - evolution_network

  # MOTOR PHP (SAMA Branding App)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: meu-php:latest
    container_name: whatsapp_app_php
    restart: always
    working_dir: /var/www
    volumes:
      - ./app:/var/www
    networks:
      - evolution_network
    depends_on:
      - mysql

  # SERVIDOR WEB (Nginx)
  # Acesso: http://157.173.100.233
  nginx:
    image: nginx:alpine
    container_name: whatsapp_app_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - evolution_network
    depends_on:
      - app

  # BANCO DE DADOS MYSQL (Laravel)
  mysql:
    image: mysql:8.0
    container_name: whatsapp_app_db
    restart: always
    environment:
      MYSQL_DATABASE: whatsapp_sender
      MYSQL_USER: marcel
      MYSQL_PASSWORD: password_mysql_123
      MYSQL_ROOT_PASSWORD: root_password_456
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - evolution_network

  # INTERFACE GRÁFICA PARA O BANCO
  # Acesso: http://157.173.100.233:8081
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: whatsapp_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
    networks:
      - evolution_network

  # BANCO DA EVOLUTION API
  postgres:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - evolution_network

  # EVOLUTION API
  # Acesso: http://157.173.100.233:8080
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - .env.docker
    volumes:
      - ./data/evolution_instances:/evolution/instances
    networks:
      - evolution_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # STORAGE S3 (Minio)
  # API: Porta 9000 | Console: Porta 9001
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "sua_senha_forte_123"
    command: server /data --console-address ":9001"
    restart: always
    networks:
      evolution_network:
        aliases:
          - s3.meusistema.local

  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - evolution_network
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio_storage:9000 admin sua_senha_forte_123;
      /usr/bin/mc mb myminio/ads || true;
      /usr/bin/mc anonymous set download myminio/ads;
      exit 0;
      "
networks:
  evolution_network:
    driver: bridge
volumes:
  n8n_data:
  minio_data: