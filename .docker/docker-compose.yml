version: '3.8'

services:
  # MONITORAMENTO E GESTÃO: REDIS
  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis
    restart: always
    command: redis-server --appendonly yes --requirepass password_redis_123
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - evolution_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password_redis_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MOTOR PHP (Site/API)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: meu-php:latest
    container_name: whatsapp_app_php
    restart: always
    working_dir: /var/www
    entrypoint: []
    ports:
      - "9000"
    volumes:
      - ./app:/var/www
    networks:
      - evolution_network
    depends_on:
      - mysql
    logging:
     driver: "json-file"
     options:
       max-size: "10m"
       max-file: "3"

  # SERVIDOR WEB (Nginx)
  nginx:
    image: nginx:alpine
    container_name: whatsapp_app_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443" 
      - "9000:9000" 
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./app:/var/www
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - evolution_network
    depends_on:
      - app
    logging:
     driver: "json-file"
     options:
       max-size: "10m"
       max-file: "3"

  # BANCO DE DADOS MYSQL (Laravel)
  mysql:
    image: mysql:8.0
    container_name: whatsapp_app_db
    restart: always
    environment:
      MYSQL_DATABASE: whatsapp_sender
      MYSQL_USER: marcel
      MYSQL_PASSWORD: password_mysql_123
      MYSQL_ROOT_PASSWORD: root_password_456
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - evolution_network

  # BANCO EVOLUTION (Postgres)
  postgres:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - evolution_network

  # EVOLUTION API (Corrigido para aguardar o Redis)
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.0
    container_name: evolution_api
    restart: always
    ports:
      - "8080"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./data/evolution_instances:/evolution/instances
    networks:
      - evolution_network

  # STORAGE S3
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "sua_senha_forte_123"
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - evolution_network
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: whatsapp_phpmyadmin
    restart: always
    ports:
      - "8082:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
    networks:
      - evolution_network


networks:
  evolution_network:
    driver: bridge

